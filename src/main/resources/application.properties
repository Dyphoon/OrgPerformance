spring.application.name=orgperformance
server.port=8080

# DataSource
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/termgoal?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=dyphoon2018
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.cmbchina.orgperformance.entity
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# MinIO
minio.endpoint=http://localhost:9000
minio.access-key=minioadmin
minio.secret-key=minioadmin
minio.bucket-templates=perf-templates
minio.bucket-reports=perf-reports
minio.bucket-uploads=perf-uploads
minio.bucket-collectors=perf-collectors

# JWT
jwt.secret=TermGoalSecretKey2026ForJWTTokenGeneration
jwt.expiration=86400000

# Mail
spring.mail.host=smtp.example.com
spring.mail.port=587
spring.mail.username=noreply@example.com
spring.mail.password=mailpassword
spring.mail.from=noreply@example.com

# IM Notification
im.type=dingtalk
im.dingtalk.webhook=
im.dingtalk.secret=
im.feishu.webhook=
im.wechatwork.webhook=

# Logging
logging.level.com.cmbchina.orgperformance=DEBUG

# MCP Server (Spring AI 1.1.4) - Stateless 协议，无需 sessionId
spring.ai.mcp.server.protocol=STATELESS
spring.ai.mcp.server.stateless.mcp-endpoint=/mcp
spring.ai.mcp.server.capabilities.tools=true
spring.ai.mcp.server.capabilities.tools-list-changed=true
spring.ai.mcp.server.name=orgperformance-mcp
spring.ai.mcp.server.version=1.0.0

